<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>TIRI｜網站版本</title>
<style>
  :root {
    --ink: #17141f;
    --paper: #fbfaf8;
    --purple: #6c1f93;
    --purple-soft: #8640ae;
    --line: rgba(23, 20, 31, 0.14);
    --mono: "Roboto Mono", "SF Mono", Menlo, monospace;
    --sans: "Archivo", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .wrap { width: min(960px, calc(100% - 48px)); margin: 0 auto; }
  header { padding: 48px 0 0; }
  .brand strong { font-size: 28px; letter-spacing: 0.02em; }
  .brand strong span { color: var(--purple); }
  main { flex: 1; display: flex; align-items: center; padding: 56px 0 64px; }
  h1 { font-size: clamp(28px, 4.5vw, 40px); font-weight: 500; line-height: 1.25; margin-bottom: 40px; }
  .versions { list-style: none; border-top: 1px solid var(--line); }
  .versions li { border-bottom: 1px solid var(--line); }
  .versions a {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    gap: 24px;
    align-items: center;
    padding: 30px 8px;
    text-decoration: none;
    color: inherit;
    transition: background-color 0.25s ease;
  }
  .versions a:hover, .versions a:focus-visible { background: rgba(108, 31, 147, 0.05); }
  .versions a:focus-visible { outline: 2px solid var(--purple); outline-offset: 2px; }
  .vcode { font-family: var(--mono); font-size: 13px; letter-spacing: 0.12em; color: rgba(23,20,31,0.55); }
  .vname { font-size: 20px; font-weight: 500; }
  .varrow { font-family: var(--mono); font-size: 14px; color: var(--purple); }
  @media (max-width: 640px) {
    .wrap { width: min(100% - 32px, 960px); }
    header { padding-top: 32px; }
    main { padding: 40px 0; }
    .versions a { grid-template-columns: 52px 1fr auto; gap: 12px; padding: 24px 4px; }
    .vname { font-size: 18px; }
  }
</style>
</head>
<body>
<header class="wrap">
  <p class="brand"><strong>TI<span>RI</span></strong></p>
</header>
<main class="wrap">
  <div style="width:100%">
    <h1>選擇網站版本</h1>
    <ul class="versions">
      <li>
        <a href="original/html/index.html">
          <span class="vcode">原版</span>
          <span class="vname">原版網站</span>
          <span class="varrow">→</span>
        </a>
      </li>
      <li>
        <a href="v1/html/index.html">
          <span class="vcode">V1</span>
          <span class="vname">專業編輯版</span>
          <span class="varrow">→</span>
        </a>
      </li>
      <li>
        <a href="v2/html/index.html">
          <span class="vcode">V2</span>
          <span class="vname">現代清新版</span>
          <span class="varrow">→</span>
        </a>
      </li>
    </ul>
  </div>
</main>
</body>
</html>
